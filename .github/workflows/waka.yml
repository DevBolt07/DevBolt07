name: Waka Readme
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update-readme:
    name: Update WakaTime stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TIME: "true"
          SHOW_TITLE: "true"
          TIME_RANGE: "last_year"
